version: '3.8'

services:
  # PHP Application
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_php
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/event_db?serverVersion=16&charset=utf8
    volumes:
      - .:/var/www/html
    depends_on:
      - database
      - mailer
    networks:
      - event_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: event_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - event_network

  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: event_database
    environment:
      - POSTGRES_DB=event_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - event_network

  # Mailpit (Email testing)
  mailer:
    image: axllent/mailpit
    container_name: event_mailer
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
    volumes:
      - mailer_data:/data
    networks:
      - event_network

networks:
  event_network:
    driver: bridge

volumes:
  database_data:
  mailer_data: