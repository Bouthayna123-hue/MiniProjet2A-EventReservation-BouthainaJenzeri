version: '3.8'

services:
  # PHP Application
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_php
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET:-your-secret-key}
      - DATABASE_URL=postgresql://event_user:event_password@db:5432/event_db?serverVersion=15&charset=utf8
    volumes:
      - .:/var/www/html
      - ./var:/var/www/html/var
    depends_on:
      - db
    networks:
      - event_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: event_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - php
    networks:
      - event_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: event_db
    environment:
      - POSTGRES_DB=event_db
      - POSTGRES_USER=event_user
      - POSTGRES_PASSWORD=event_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - event_network

  # Adminer (Database management - optional)
  adminer:
    image: adminer:latest
    container_name: event_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - event_network

networks:
  event_network:
    driver: bridge

volumes:
  postgres_data: